@if (products.length > 0) {
  <div class="product-grid">
    @for (product of products; track product.id) {
      <app-product-item
        [product]="product"
        (delete)="onDelete($event)"
        (like)="onLike($event)" />
    }
  </div>
} @else {
  <div class="empty-message">
    <p>Нет товаров в этой категории</p>
  </div>
}
